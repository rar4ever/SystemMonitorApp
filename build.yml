name: Build SystemMonitorApp Ventura
on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-13
    steps:
      - name: Récupérer le fichier ZIP
        uses: actions/checkout@v4

      - name: Décompresser le projet
        run: unzip SystemMonitorApp_v7.0.zip

      - name: Compiler SystemMonitorApp
        run: |
          xcodebuild -project SystemMonitorApp/SystemMonitorApp.xcodeproj \
                     -scheme SystemMonitorApp \
                     -configuration Release \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     MACOSX_DEPLOYMENT_TARGET=13.0 \
                     -derivedDataPath build

      - name: Compresser l'application finale
        run: |
          cd build/Build/Products/Release
          zip -r ../../../../SystemMonitorApp_Ventura.zip *.app

      - name: Télécharger le fichier final
        uses: actions/upload-artifact@v4
        with:
          name: SystemMonitorApp-Ventura
          path: SystemMonitorApp_Ventura.zip

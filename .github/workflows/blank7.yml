name: Build SystemMonitorApp Ventura
on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Récupérer les fichiers
        uses: actions/checkout@v4

      - name: Décompresser le projet ZIP
        run: |
          ZIP_FILE=$(find . -name "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Fichier ZIP trouvé : $ZIP_FILE"
            unzip -o "$ZIP_FILE"
          else
            echo "Erreur : Aucun fichier ZIP trouvé !"
            exit 1
          fi

      - name: Reconstruire le fichier projet Xcode
        run: |
          python3 << 'PYTHON_EOF'
          import os
          import re
          
          pbxproj_path = None
          for root, dirs, files in os.walk('.'):
              if 'project.pbxproj' in files:
                  pbxproj_path = os.path.join(root, 'project.pbxproj')
                  break
          
          if not pbxproj_path:
              print("❌ Aucun fichier project.pbxproj trouvé!")
              exit(1)
          
          print(f"📁 Traitement de : {pbxproj_path}")
          
          with open(pbxproj_path, 'r', encoding='utf-8', errors='ignore') as f:
              content = f.read()
          
          # 1. Supprimer les marqueurs de conflit Git
          content = re.sub(r'<<<<<<<[^\n]*\n.*?\n=======\n.*?\n>>>>>>>[^\n]*\n', '', content, flags=re.DOTALL)
          
          # 2. Supprimer TOUS les attributs 'buildPhase'
          content = re.sub(r'^\s*buildPhase\s*=\s*[A-Fa-f0-9]+;\s*$', '', content, flags=re.MULTILINE)
          
          # 3. Supprimer les blocs PBXFileReference mal formés
          lines = content.split('\n')
          fixed_lines = []
          skip_count = 0
          
          for i, line in enumerate(lines):
              if skip_count > 0:
                  skip_count -= 1
                  continue
              
              if re.search(r'isa\s*=\s*PBXFileReference', line):
                  check_ahead = '\n'.join(lines[i:min(i+10, len(lines))])
                  if 'buildPhase' in check_ahead:
                      for j in range(i, min(i+15, len(lines))):
                          if '};' in lines[j]:
                              skip_count = j - i
                              break
                      continue
              
              fixed_lines.append(line)
          
          content = '\n'.join(fixed_lines)
          
          # 4. Nettoyer les espaces en blanc excessifs
          content = re.sub(r'\n\n\n+', '\n\n', content)
          
          # 5. Fixer les tableaux vides mal formés
          content = re.sub(r'files\s*=\s*\(\s*\);', 'files = ();', content)
          
          # 6. Supprimer les virgules en fin
          content = re.sub(r',(\s*[}\)])', r'\1', content)
          
          with open(pbxproj_path, 'w', encoding='utf-8') as f:
              f.write(content)
          
          print("✅ Fichier project.pbxproj réparé avec succès!")
          PYTHON_EOF

      - name: Valider le projet Xcode
        run: |
          XCODEPROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          if [ -z "$XCODEPROJ_PATH" ]; then
            echo "❌ Impossible de trouver un fichier .xcodeproj !"
            exit 1
          fi
          echo "📍 Projet trouvé : $XCODEPROJ_PATH"
          
          xcodebuild -list -project "$XCODEPROJ_PATH" -json > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "⚠️ Le projet est toujours endommagé!"
            exit 1
          fi
          
          echo "✅ Projet valide!"

      - name: Compiler l'application
        run: |
          XCODEPROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME_NAME=$(xcodebuild -list -project "$XCODEPROJ_PATH" -json 2>/dev/null | grep -m 1 'name' | head -1 | sed 's/.*"name" : "\(.*\)".*/\1/')
          
          if [ -z "$SCHEME_NAME" ]; then
            SCHEME_NAME="SystemMonitorApp"
          fi
          echo "🔨 Compilation du scheme : $SCHEME_NAME"
          
          xcodebuild -project "$XCODEPROJ_PATH" \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     MACOSX_DEPLOYMENT_TARGET=13.0 \
                     -derivedDataPath build \
                     -verbose 2>&1 | tail -100

      - name: Compresser l'application finale
        run: |
          if [ -d "build/Build/Products/Release" ]; then
            cd build/Build/Products/Release
            zip -r ../../../../SystemMonitorApp_Ventura.zip *.app
          else
            echo "❌ Répertoire de build introuvable!"
            find . -name "*.app" -type d
            exit 1
          fi

      - name: Télécharger le fichier final
        uses: actions/upload-artifact@v4
        with:
          name: SystemMonitorApp-Ventura
          path: SystemMonitorApp_Ventura.zip

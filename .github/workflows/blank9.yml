name: Build SystemMonitorApp Ventura
on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Récupérer les fichiers
        uses: actions/checkout@v4

      - name: Décompresser le projet ZIP
        run: |
          ZIP_FILE=$(find . -name "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Fichier ZIP trouvé : $ZIP_FILE"
            unzip -o "$ZIP_FILE"
          else
            echo "Erreur : Aucun fichier ZIP trouvé !"
            exit 1
          fi

      - name: Réparer proprement le projet Xcode corrompu
        run: |
          cat << 'EOF' > repair.py
          import re
          import os
          
          pbxproj_path = None
          for root, dirs, files in os.walk('.'):
              if 'project.pbxproj' in files:
                  pbxproj_path = os.path.join(root, 'project.pbxproj')
                  break
          
          if pbxproj_path:
              print(f"Analyse et réparation globale de : {pbxproj_path}")
              with open(pbxproj_path, 'r', encoding='utf-8', errors='ignore') as f:
                  content = f.read()
              
              # 1. Réparation ciblée de la section PBXFileReference (gère le multi-ligne et le mono-ligne)
              def clean_file_ref_section(match):
                  section_text = match.group(2)
                  # Supprime uniquement l'attribut buildPhase sans toucher au reste de l'objet
                  cleaned_text = re.sub(r'buildPhase\s*=\s*[^;]+;\s*\n?', '', section_text)
                  return match.group(1) + cleaned_text + match.group(3)
              
              content = re.sub(
                  r'(/\* Begin PBXFileReference section \*/)(.*?)(/\* End PBXFileReference section \*/)',
                  clean_file_ref_section,
                  content,
                  flags=re.DOTALL
              )
              
              # 2. Sécurité : Nettoyer tout bloc avec accolade contenant 'isa = PBXFileReference' au cas où
              def clean_individual_blocks(match):
                  block_text = match.group(0)
                  if 'isa = PBXFileReference' in block_text:
                      return re.sub(r'buildPhase\s*=\s*[^;]+;\s*\n?', '', block_text)
                  return block_text
              
              content = re.sub(r'\{[^}]+\}', clean_individual_blocks, content)
              
              # 3. Supprimer les marqueurs de conflit Git résiduels si présents
              content = re.sub(r'<<<<<<<[^\n]*\n.*?\n=======\n.*?\n>>>>>>>[^\n]*\n', '', content, flags=re.DOTALL)
              
              # 4. Correction des virgules orphelines suite au nettoyage
              content = re.sub(r',(\s*[}\)])', r'\1', content)
              
              with open(pbxproj_path, 'w', encoding='utf-8') as f:
                  f.write(content)
              
              print("✅ Projet Xcode nettoyé en profondeur avec succès !")
          else:
              print("❌ Aucun fichier project.pbxproj trouvé.")
          EOF
          python3 repair.py

      - name: Trouver et Valider le projet Xcode
        run: |
          XCODEPROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          if [ -z "$XCODEPROJ_PATH" ]; then
            echo "❌ Impossible de trouver un fichier .xcodeproj !"
            exit 1
          fi
          echo "📍 Projet trouvé : $XCODEPROJ_PATH"
          
          # Désactivation temporaire du "exit on error" de bash pour capturer le code de xcodebuild
          set +e
          xcodebuild -list -project "$XCODEPROJ_PATH"
          XCODE_STATUS=$?
          set -e
          
          if [ $XCODE_STATUS -ne 0 ]; then
            echo "❌ Erreur critique : Le projet Xcode refuse toujours de s'ouvrir (Code $XCODE_STATUS) !"
            exit 1
          fi
          echo "✅ Projet valide et lisible par Xcode !"

      - name: Compiler l'application
        run: |
          XCODEPROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME_NAME=$(xcodebuild -list -project "$XCODEPROJ_PATH" 2>/dev/null | awk '/Schemes:/{flag=1;next}/^$/{flag=0}flag' | sed 's/^[[:space:]]*//' | head -n 1)
          if [ -z "$SCHEME_NAME" ]; then
            SCHEME_NAME="SystemMonitorApp"
          fi
          echo "🚀 Scheme détecté : $SCHEME_NAME"

          xcodebuild -project "$XCODEPROJ_PATH" \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     MACOSX_DEPLOYMENT_TARGET=13.0 \
                     -derivedDataPath build

      - name: Compresser l'application finale
        run: |
          cd build/Build/Products/Release
          zip -r ../../../../SystemMonitorApp_Ventura.zip *.app

      - name: Télécharger le fichier final
        uses: actions/upload-artifact@v4
        with:
          name: SystemMonitorApp-Ventura
          path: SystemMonitorApp_Ventura.zip
